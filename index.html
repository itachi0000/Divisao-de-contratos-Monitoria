<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa de Divisão de Contratos</title>

  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2}
    *{box-sizing:border-box;font-family:Inter,system-ui}
    body{margin:0;background:#0f1724;color:#e6eef6;padding:28px}

    .app{max-width:1100px;margin:0 auto}

    header{display:flex;align-items:center;margin-bottom:20px}
    h1{margin:0}
    .meta{margin-left:auto;color:var(--muted)}

    .controls{display:flex;gap:10px;margin-bottom:15px}
    .input,select{background:#0b1220;border:1px solid rgba(255,255,255,0.05);color:#fff;padding:8px;border-radius:8px}

    .stats{display:flex;gap:10px;margin:15px 0}
    .stat{background:#0b1220;padding:10px;border-radius:8px}

    canvas{display:block;margin:20px auto}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}

    .card{
      background:#0b1220;
      border-radius:10px;
      padding:12px;
      border-left:6px solid #fff;
    }

    .title{font-weight:bold}
    .monitor{font-size:13px;color:#aaa}
  </style>
</head>
<body>

<div class="app">

<header>
  <h1>Mapa de Divisão</h1>
  <div class="meta" id="total-info"></div>
</header>

<div class="controls">
  <input id="search" class="input" placeholder="Pesquisar">
  
  <select id="filterMonitor" class="input">
    <option value="">Todos</option>
  </select>
</div>

<div class="stats">
  <div class="stat">Projetos: <strong id="statTotal"></strong></div>
  <div class="stat">Monitores: <strong id="statMonitors"></strong></div>
  <div class="stat">Top: <strong id="statTop"></strong></div>
</div>

<canvas id="pieChart" width="400" height="400"></canvas>

<div id="view" class="grid"></div>

</div>

<script>
const data = [
  {project:'FE-Amparo',monitor:'Gabriel'},
  {project:'FE-Arujá',monitor:'Vilfredo'},
  {project:'FE-Bertioga',monitor:'Vilfredo'},
  {project:'FE-Boituva',monitor:'Vilfredo'},
  {project:'FE-Cajamar',monitor:'Gabriel'},
  {project:'FE-Cordeirópolis',monitor:'Gabriel'},
  {project:'FE-Cubatão',monitor:'Mateus'},
  {project:'FE-Diadema',monitor:'Mateus'},
  {project:'FE-EMBU',monitor:'Mateus'},
  {project:'FE-Ferraz de Vasconcelos',monitor:'Vilfredo'},
  {project:'FE-Francisco Morato',monitor:'Vilfredo'},
  {project:'FE-Gov. Valadares',monitor:'Vilfredo'},
  {project:'FE-Guaratinguetá',monitor:'Vilfredo'},
  {project:'FE-Guarujá',monitor:'Mateus'},
  {project:'FE-Itapecerica',monitor:'Mateus'},
  {project:'FE-Jacareí',monitor:'Gabriel'},
  {project:'FE-Jaguariuna',monitor:'Vilfredo'},
  {project:'FE-Limeira',monitor:'Gabriel'},
  {project:'FE-Valinhos',monitor:'Gabriel'},
  {project:'FE-Vinhedo',monitor:'Gabriel'},
  {project:'FE-Osasco',monitor:'Mateus'},
  {project:'FE-Praia Grande',monitor:'Mateus'},
  {project:'FE-Santa Bárbara',monitor:'Gabriel'},
  {project:'FE-Suzano',monitor:'Vilfredo'},
  {project:'FE-Ribeirão Pires',monitor:'Vilfredo'},
  {project:'FE-Santa Isabel',monitor:'Vilfredo'},
  {project:'FE-São Sebastião',monitor:'Mateus'},
  {project:'FE-Santo Antônio dos Pinhais',monitor:'Vilfredo'},
];

const colors = {};
const palette = ['#00FF00','#FF0000','#0000EE'];

function unique(arr){return [...new Set(arr)]}

function build(){
  const monitors = unique(data.map(d=>d.monitor));

  monitors.forEach((m,i)=>colors[m]=palette[i]);

  // preencher filtro
  const filter = document.getElementById('filterMonitor');
  filter.innerHTML = '<option value="">Todos</option>' + monitors.map(m=>`<option value="${m}">${m}</option>`).join('');

  updateStats(data);
  drawPie(data);
  render(data);
}

function updateStats(list){
  const monitors = unique(list.map(d=>d.monitor));

  document.getElementById('statTotal').innerText = list.length;
  document.getElementById('statMonitors').innerText = monitors.length;

  const counts = monitors.map(m=>({
    m,
    c: list.filter(d=>d.monitor===m).length
  })).sort((a,b)=>b.c-a.c);

  document.getElementById('statTop').innerText = counts.length ? counts[0].m + " ("+counts[0].c+")" : '-';
  document.getElementById('total-info').innerText = `Projetos: ${list.length} | Monitores: ${monitors.length}`;
}

function drawPie(list){
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0,0,400,400);

  const monitors = unique(list.map(d=>d.monitor));
  const counts = monitors.map(m=>list.filter(d=>d.monitor===m).length);
  const total = counts.reduce((a,b)=>a+b,0);

  let start=0;

  monitors.forEach((m,i)=>{
    const slice = (counts[i]/total)*2*Math.PI;

    ctx.beginPath();
    ctx.moveTo(200,200);
    ctx.arc(200,200,150,start,start+slice);
    ctx.fillStyle = colors[m];
    ctx.fill();

    // TEXTO PRETO
    const mid = start + slice/2;
    const x = 200 + Math.cos(mid)*100;
    const y = 200 + Math.sin(mid)*100;

    ctx.fillStyle = "#000";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";
    ctx.fillText(`${m} (${counts[i]})`, x, y);

    start+=slice;
  });
}

function render(list){
  const view = document.getElementById('view');

  view.innerHTML = list.map(d=>`
    <div class="card" style="border-left:6px solid ${colors[d.monitor]}">
      <div class="title">${d.project}</div>
      <div class="monitor">${d.monitor}</div>
    </div>
  `).join('');
}

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filterMonitor').value;

  const filtered = data.filter(d=>{
    return (!q || d.project.toLowerCase().includes(q) || d.monitor.toLowerCase().includes(q)) &&
           (!f || d.monitor===f);
  });

  updateStats(filtered);
  drawPie(filtered);
  render(filtered);
}

document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('filterMonitor').addEventListener('change',applyFilters);

build();
</script>

</body>
</html>
